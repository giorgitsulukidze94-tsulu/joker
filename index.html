<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <!-- მობილურის ეკრანის ზუმის (Zoom) სრული ბლოკირება -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joker Neon Scoreboard</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff007f;
            --neon-purple: #9d00ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        /* ბაზისური სტილები და ეკრანის გადიდების პრევენცია */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a0b2e 0%, #0a0514 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin-top: 10px;
        }

        /* Glassmorphism კონტეინერები */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg);
            transition: 0.75s;
        }
        .glass-card:hover::before { left: 125%; }

        h2 {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-purple);
        }

        /* ფორმის ელემენტები */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #b5a9df;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.3);
        }

        /* Toggle გადამრთველი პარა რეჟიმისთვის */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 12px 15px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px; height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px;
            border: 1px solid var(--glass-border);
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-magenta);
        }
        input:checked + .slider { background-color: rgba(157, 0, 255, 0.3); border-color: var(--neon-purple); }
        input:checked + .slider:before { transform: translateX(24px); background-color: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); }

        /* Liquid მნათობი ღილაკები */
        .btn-liquid {
            position: relative;
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-magenta));
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.4);
            transition: all 0.3s ease;
        }
        .btn-liquid:active {
            transform: scale(0.98);
            box-shadow: 0 0 5px rgba(157, 0, 255, 0.2);
        }
        /* თხევადი ტალღის ეფექტი შიგნით */
        .btn-liquid::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 150%; height: 150%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.6s ease-out;
        }
        .btn-liquid:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }

        /* სათამაშო ინტერფეისის ბლოკები */
        .hidden { display: none !important; }
        
        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .current-hand-title {
            font-size: 1.2rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.5);
            font-weight: bold;
        }

        /* მოთამაშეების რიგები ქულების შეყვანისას */
        .player-input-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .player-name-label {
            font-weight: 600;
            font-size: 1rem;
            color: #e2d9ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .score-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            min-height: 44px;
            transition: all 0.2s ease;
        }
        .score-box.active-input {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
            background: rgba(0, 243, 255, 0.05);
        }
        .score-box:empty::before {
            content: '-';
            color: rgba(255,255,255,0.3);
        }

        /* შუშისებრი ციფრული კლავიატურა */
        .custom-keyboard {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(13, 6, 26, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--glass-border);
            border-radius: 24px 24px 0 0;
            padding: 20px 15px calc(20px + env(safe-area-inset-bottom));
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
            z-index: 999;
        }
        .custom-keyboard.open { transform: translateY(0); }
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        .key-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .key-btn:active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
            transform: scale(0.95);
        }
        .key-btn.special {
            background: rgba(255, 0, 127, 0.15);
            border-color: rgba(255, 0, 127, 0.3);
            color: #ff66b2;
        }

        /* რეალურ დროში ქულების ჯამური დაფა */
        .live-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .live-player-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 5px;
        }
        .live-name { font-size: 0.85rem; color: #b5a9df; margin-bottom: 5px; text-overflow: ellipsis; overflow: hidden; }
        .live-score { font-size: 1.2rem; font-weight: bold; color: var(--neon-cyan); text-shadow: 0 0 5px rgba(0,243,255,0.3); }

        /* მინი ისტორიის ცხრილი */
        .history-wrapper {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: center; }
        th { background: rgba(157, 0, 255, 0.1); color: #b5a9df; padding: 8px; font-weight: 600; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #ddd; }
        
        /* ლოადერი აპს სკრიპტთან კავშირისას */
        .loader {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.1); border-radius: 50%;
            border-top-color: var(--neon-cyan); animation: spin 1s ease-in-out infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ეკრანი 1: კონფიგურაცია -->
    <div id="setup-screen" class="glass-card">
        <h2>Joker Setup</h2>
        <div class="form-group">
            <label>მოთამაშე 1</label>
            <input type="text" id="p1-name" class="form-control" value="მოთამაშე 1">
        </div>
        <div class="form-group">
            <label>მოთამაშე 2</label>
            <input type="text" id="p2-name" class="form-control" value="მოთამაშე 2">
        </div>
        <div class="form-group">
            <label>მოთამაშე 3</label>
            <input type="text" id="p3-name" class="form-control" value="მოთამაშე 3">
        </div>
        <div class="form-group">
            <label>მოთამაშე 4</label>
            <input type="text" id="p4-name" class="form-control" value="მოთამაშე 4">
        </div>

        <div class="toggle-container">
            <span style="font-size: 0.9rem; color: #e2d9ff; font-weight: 600;">წყვილებში თამაში (პარა)</span>
            <label class="switch">
                <input type="checkbox" id="game-mode">
                <span class="slider"></span>
            </label>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px;">
            <div class="form-group">
                <label>სტანდარტული ხიშტი</label>
                <input type="number" id="normal-khishti" class="form-control" value="200">
            </div>
            <div class="form-group">
                <label>9-იანების ხიშტი</label>
                <input type="number" id="nine-khishti" class="form-control" value="500">
            </div>
        </div>

        <button class="btn-liquid" onclick="startGame()">დაიწყე თამაში</button>
    </div>

    <!-- ეკრანი 2: ძირითადი თამაშის პანელი -->
    <div id="game-screen" class="glass-card hidden">
        <div class="game-header">
            <div id="hand-indicator" class="current-hand-title">ხელი 1 / დარიგება: 1 კარტი</div>
        </div>

        <!-- ლაივ ქულების დაფა თავზე -->
        <div class="live-board">
            <div class="live-player-card"><div id="l-p1-n" class="live-name">-</div><div id="l-p1-s" class="live-score">0</div></div>
            <div class="live-player-card"><div id="l-p2-n" class="live-name">-</div><div id="l-p2-s" class="live-score">0</div></div>
            <div class="live-player-card"><div id="l-p3-n" class="live-name">-</div><div id="l-p3-s" class="live-score">0</div></div>
            <div class="live-player-card"><div id="l-p4-n" class="live-name">-</div><div id="l-p4-s" class="live-score">0</div></div>
        </div>

        <!-- ქულების შეყვანის ბლოკი -->
        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; padding: 0 12px; font-size: 0.8rem; color: #b5a9df; text-transform: uppercase;">
            <div>მოთამაშე</div><div>თქვა</div><div>აიღო</div>
        </div>

        <div id="input-rows-container">
            <!-- აქ დინამიკურად ჩაჯდება 4 მოთამაშის სტრიქონი -->
        </div>

        <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 10px;">
            <button id="submit-hand-btn" class="btn-liquid" onclick="saveHand()">ხელის შენახვა</button>
            <button class="btn-liquid" style="background: rgba(255,255,255,0.05); box-shadow: none; font-size: 0.9rem; margin-top: 5px;" onclick="endGame()">თამაშის დასრულება და არქივი</button>
        </div>

        <!-- მინი ისტორია ცხრილი ქვემოთ -->
        <div class="history-wrapper">
            <table id="history-table">
                <thead>
                    <tr><th>ხ#</th><th>კ</th><th id="th-p1">-</th><th id="th-p2">-</th><th id="th-p3">-</th><th id="th-p4">-</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

</div>

<!-- ციფრული კლავიატურა -->
<div id="custom-keyboard" class="custom-keyboard">
    <div class="keyboard-grid">
        <button class="key-btn" onclick="pressKey(0)">0 (პასი)</button>
        <button class="key-btn" onclick="pressKey(1)">1</button>
        <button class="key-btn" onclick="pressKey(2)">2</button>
        <button class="key-btn" onclick="pressKey(3)">3</button>
        <button class="key-btn" onclick="pressKey(4)">4</button>
        <button class="key-btn" onclick="pressKey(5)">5</button>
        <button class="key-btn" onclick="pressKey(6)">6</button>
        <button class="key-btn" onclick="pressKey(7)">7</button>
        <button class="key-btn" onclick="pressKey(8)">8</button>
        <button class="key-btn" onclick="pressKey(9)">9</button>
        <button class="key-btn special" onclick="pressKey('C')">C</button>
        <button class="key-btn special" style="background: var(--neon-purple); color: #fff;" onclick="closeKeyboard()">OK</button>
    </div>
</div>

<script>
    // შენი Google Apps Script Web App URL
    const API_URL = "https://script.google.com/macros/s/AKfycbyjS0CJTjCMWlgBV4nb4ViR9WrMz1QmLLsNXoZNnD_dMvis5UPEi9zE4YJNR8B2Zn2q/exec";

    let currentHand = 1;
    let players = [];
    let cumulativeScores = [0, 0, 0, 0];
    let activeInputId = null;

    // ჯოკერის კლასიკური დარიგებების თანმიმდევრობა (1-დან 8-მდე, ოთხი 9-იანი, 8-დან 1-მდე)
    const handsSequence = [1,2,3,4,5,6,7,8,9,9,9,9,8,7,6,5,4,3,2,1];

    function getCardsCount(handId) {
        return handsSequence[(handId - 1) % handsSequence.length];
    }

    // თამაშის დაწყება
    async function startGame() {
        players = [
            document.getElementById('p1-name').value.trim() || 'მოთამაშე 1',
            document.getElementById('p2-name').value.trim() || 'მოთამაშე 2',
            document.getElementById('p3-name').value.trim() || 'მოთამაშე 3',
            document.getElementById('p4-name').value.trim() || 'მოთამაშე 4'
        ];
        
        const isPara = document.getElementById('game-mode').checked;
        const normalKhishti = document.getElementById('normal-khishti').value;
        const nineKhishti = document.getElementById('nine-khishti').value;

        setLoading('submit-hand-btn', true, "ახლავე...");

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'startGame',
                    mode: isPara ? 'პარა' : 'ინდივიდუალური',
                    normalKhishti: normalKhishti,
                    nineKhishti: nineKhishti,
                    p1: players[0], p2: players[1], p3: players[2], p4: players[3]
                })
            });
            
            const resData = await response.json();
            if(resData.status === 'success') {
                setupGameUI();
            }
        } catch (e) {
            alert('კავშირის შეცდომა ბაზასთან. სცადე ხელახლა.');
        } finally {
            setLoading('submit-hand-btn', false, "ხელის შენახვა");
        }
    }

    function setupGameUI() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');

        // ლაივ დაფის სახელების განახლება
        for(let i=0; i<4; i++) {
            document.getElementById(`l-p${i+1}-n`).innerText = players[i];
            document.getElementById(`th-p${i+1}`).innerText = players[i];
        }
        
        updateHandIndicator();
        generateInputRows();
    }

    function updateHandIndicator() {
        const cards = getCardsCount(currentHand);
        document.getElementById('hand-indicator').innerText = `ხელი ${currentHand} / დარიგება: ${cards} კარტი`;
    }

    function generateInputRows() {
        const container = document.getElementById('input-rows-container');
        container.innerHTML = '';
        
        for(let i=0; i<4; i++) {
            const row = document.createElement('div');
            row.className = 'player-input-row';
            row.innerHTML = `
                <div class="player-name-label">${players[i]}</div>
                <div class="score-box" id="said-${i}" onclick="openKeyboard('said-${i}')"></div>
                <div class="score-box" id="took-${i}" onclick="openKeyboard('took-${i}')"></div>
            `;
            container.appendChild(row);
        }
    }

    // კლავიატურის მართვა
    function openKeyboard(id) {
        if(activeInputId) {
            document.getElementById(activeInputId).classList.remove('active-input');
        }
        activeInputId = id;
        document.getElementById(id).classList.add('active-input');
        document.getElementById('custom-keyboard').classList.add('open');
    }

    function closeKeyboard() {
        if(activeInputId) {
            document.getElementById(activeInputId).classList.remove('active-input');
            activeInputId = null;
        }
        document.getElementById('custom-keyboard').classList.remove('open');
    }

    function pressKey(key) {
        if(!activeInputId) return;
        const target = document.getElementById(activeInputId);
        if(key === 'C') {
            target.innerText = '';
        } else {
            target.innerText = key; // ვინაიდან ჯოკერში მაქსიმუმ 9 კარტია, ერთნიშნა ციფრი საკმარისია
            closeKeyboard();
        }
    }

    // ხელის შედეგების შენახვა და გუგლ შიტში გაგზავნა
    async function saveHand() {
        const cardsCount = getCardsCount(currentHand);
        let totalTook = 0;
        let payload = {
            action: 'saveHand',
            handNumber: currentHand,
            cardsCount: cardsCount
        };

        // მონაცემების ვალიდაცია
        for(let i=0; i<4; i++) {
            const saidVal = document.getElementById(`said-${i}`).innerText;
            const tookVal = document.getElementById(`took-${i}`).innerText;

            if(saidVal === '' || tookVal === '') {
                alert('გთხოვთ შეავსოთ ყველა მოთამაშის ნათქვამი და წაღებული!');
                return;
            }

            totalTook += Number(tookVal);
            payload[`player${i+1}`] = { said: Number(saidVal), took: Number(tookVal) };
        }

        // ვალიდაცია: წაღებულების ჯამი უნდა უდრიდეს დარიგებულს
        if(totalTook !== cardsCount) {
            alert(`შეცდომა! წაღებული კარტების ჯამი (${totalTook}) უნდა უდრიდეს დარიგებული კარტების რაოდენობას (${cardsCount})!`);
            return;
        }

        setLoading('submit-hand-btn', true, "ქულები ითვლება...");

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const resData = await response.json();

            if(resData.status === 'success') {
                // ქულების განახლება ინტერფეისში
                addHistoryRow(currentHand, cardsCount, payload, resData.scores);
                
                for(let i=0; i<4; i++) {
                    cumulativeScores[i] += resData.scores[i];
                    document.getElementById(`l-p${i+1}-s`).innerText = cumulativeScores[i];
                }

                // შემდეგ ხელზე გადასვლა
                currentHand++;
                updateHandIndicator();
                generateInputRows();
            }
        } catch(e) {
            alert('მონაცემების შენახვისას მოხდა შეცდომა. სცადეთ ხელახლა.');
        } finally {
            setLoading('submit-hand-btn', false, "ხელის შენახვა");
        }
    }

    function addHistoryRow(handNum, cards, payload, calculatedScores) {
        const tbody = document.getElementById('history-body');
        const tr = document.createElement('tr');
        
        tr.innerHTML = `
            <td>${handNum}</td>
            <td style="color: var(--neon-cyan);">${cards}</td>
            <td>${payload.player1.said}/${payload.player1.took} (${calculatedScores[0]})</td>
            <td>${payload.player2.said}/${payload.player2.took} (${calculatedScores[1]})</td>
            <td>${payload.player3.said}/${payload.player3.took} (${calculatedScores[2]})</td>
            <td>${payload.player4.said}/${payload.player4.took} (${calculatedScores[3]})</td>
        `;
        tbody.insertBefore(tr, tbody.firstChild); // უახლესი ხელი ჩნდება ზემოდან
    }

    // თამაშის დასრულება და ცხრილის დაარქივება
    async function endGame() {
        if(!confirm('დარწმუნებული ხართ, რომ გსურთ მიმდინარე თამაშის დასრულება და მისი არქივში შენახვა?')) return;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'endGame' })
            });
            const resData = await response.json();
            if(resData.status === 'success') {
                alert('თამაში წარმატებით დაარქივდა!');
                location.reload(); // გვერდის გადატვირთვა ახალი თამაშისთვის
            }
        } catch(e) {
            alert('არქივაციისას მოხდა შეცდომა.');
        }
    }

    function setLoading(btnId, isLoading, text) {
        const btn = document.getElementById(btnId);
        if(isLoading) {
            btn.disabled = true;
            btn.innerHTML = `<span class="loader"></span> ${text}`;
        } else {
            btn.disabled = false;
            btn.innerHTML = text;
        }
    }
</script>
</body>
</html>
