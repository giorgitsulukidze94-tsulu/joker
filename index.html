<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Joker Scoreboard</title>

  <style>
    :root{
      --bg:#050816;
      --card:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.13);
      --cyan:#00eaff;
      --pink:#ff2bd6;
      --purple:#8b5cff;
      --gold:#ffd166;
      --green:#5cff9d;
      --red:#ff3b6b;
      --text:#fff;
      --muted:#aeb4d8;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      -webkit-user-select:none;
      touch-action:manipulation;
    }

    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,43,214,.23), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(0,234,255,.20), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(139,92,255,.18), transparent 35%),
        var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow-x:hidden;
    }

    button,input,select{
      font:inherit;
    }

    .app{
      width:100%;
      max-width:1320px;
      margin:auto;
      padding:18px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo{
      width:62px;
      height:62px;
      border-radius:20px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--purple),var(--pink));
      box-shadow:0 0 30px rgba(255,43,214,.45);
      font-size:34px;
    }

    h1{
      margin:0;
      font-size:34px;
      letter-spacing:3px;
      text-shadow:0 0 16px var(--pink),0 0 28px var(--cyan);
    }

    h2{
      margin-top:0;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      margin-top:2px;
    }

    .glass{
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));
      border:1px solid var(--line);
      box-shadow:0 20px 60px rgba(0,0,0,.38), inset 0 0 28px rgba(255,255,255,.03);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border-radius:26px;
    }

    .panel{
      padding:18px;
      margin-bottom:16px;
    }

    .grid{
      display:grid;
      gap:14px;
    }

    .setup-grid{
      grid-template-columns:repeat(4,1fr);
    }

    label{
      display:block;
      color:var(--muted);
      font-size:13px;
      margin-bottom:7px;
    }

    input,select{
      width:100%;
      border:1px solid var(--line);
      background:rgba(0,0,0,.28);
      color:white;
      border-radius:15px;
      padding:13px 14px;
      outline:none;
      box-shadow:inset 0 0 20px rgba(0,0,0,.25);
    }

    input:focus,select:focus{
      border-color:var(--cyan);
      box-shadow:0 0 18px rgba(0,234,255,.28);
    }

    .btn{
      border:0;
      color:white;
      cursor:pointer;
      border-radius:18px;
      padding:14px 18px;
      font-weight:800;
      letter-spacing:.5px;
      background:linear-gradient(135deg,var(--cyan),var(--purple),var(--pink));
      box-shadow:0 0 24px rgba(0,234,255,.35);
      transition:.16s;
      position:relative;
      overflow:hidden;
    }

    .btn:active{
      transform:scale(.97);
    }

    .btn.secondary{
      background:rgba(255,255,255,.07);
      border:1px solid var(--line);
      box-shadow:none;
    }

    .btn.red{
      background:linear-gradient(135deg,#ff3b6b,#9d003f);
      box-shadow:0 0 24px rgba(255,59,107,.35);
    }

    .hidden{
      display:none!important;
    }

    .game-layout{
      display:grid;
      grid-template-columns:280px 1fr 280px;
      gap:16px;
      align-items:start;
    }

    .stat-card{
      padding:16px;
      border-radius:20px;
      background:rgba(0,0,0,.22);
      border:1px solid var(--line);
      margin-bottom:12px;
    }

    .big-number{
      font-size:56px;
      font-weight:900;
      color:var(--cyan);
      text-shadow:0 0 22px var(--cyan);
      text-align:center;
    }

    .status-text{
      text-align:center;
      font-size:22px;
      font-weight:900;
      color:var(--gold);
      text-shadow:0 0 18px rgba(255,209,102,.5);
    }

    .players{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-bottom:14px;
    }

    .player-card{
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      border-radius:18px;
      padding:12px;
      text-align:center;
      position:relative;
    }

    .player-name{
      color:var(--muted);
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .score{
      margin-top:6px;
      font-size:27px;
      font-weight:900;
    }

    .table-wrap{
      overflow:auto;
      border-radius:20px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.22);
      max-height:480px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:820px;
    }

    th,td{
      padding:10px 8px;
      border-bottom:1px solid rgba(255,255,255,.08);
      border-right:1px solid rgba(255,255,255,.06);
      text-align:center;
      font-size:14px;
    }

    th{
      position:sticky;
      top:0;
      background:rgba(15,12,38,.96);
      color:var(--muted);
      z-index:2;
    }

    .hand-form{
      display:grid;
      gap:10px;
    }

    .input-row{
      display:grid;
      grid-template-columns:1.3fr 1fr 1fr;
      gap:8px;
      align-items:center;
      padding:9px;
      border-radius:17px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      margin-bottom:8px;
    }

    .box{
      min-height:46px;
      display:grid;
      place-items:center;
      border-radius:15px;
      background:rgba(0,0,0,.3);
      border:1px solid var(--line);
      font-size:20px;
      font-weight:900;
      cursor:pointer;
    }

    .box.active{
      border-color:var(--cyan);
      box-shadow:0 0 18px rgba(0,234,255,.35);
    }

    .bed{
      display:inline-block;
      padding:5px 8px;
      color:#fff;
      background:linear-gradient(180deg,rgba(255,59,107,.42),rgba(120,0,30,.36));
      border:1px solid rgba(255,59,107,.7);
      border-radius:18px 18px 8px 8px;
      box-shadow:0 0 18px rgba(255,59,107,.35);
      font-weight:900;
    }

    .premium{
      color:var(--green);
      text-shadow:0 0 14px var(--green);
      font-weight:900;
    }

    .keyboard{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:30;
      padding:14px;
      transform:translateY(105%);
      transition:.22s;
      background:rgba(5,8,22,.84);
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      border-top:1px solid var(--line);
      border-radius:26px 26px 0 0;
    }

    .keyboard.open{
      transform:translateY(0);
    }

    .keys{
      max-width:620px;
      margin:auto;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:10px;
    }

    .key{
      padding:16px 8px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.08);
      color:white;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
    }

    .key.blocked{
      opacity:.25;
      background:rgba(255,0,0,.15);
      text-decoration:line-through;
      pointer-events:none;
    }

    .toast{
      position:fixed;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      z-index:50;
      background:rgba(0,0,0,.72);
      border:1px solid var(--line);
      color:white;
      padding:12px 18px;
      border-radius:18px;
      box-shadow:0 0 22px rgba(0,234,255,.25);
      display:none;
      max-width:90%;
      text-align:center;
    }

    @media(max-width:980px){
      .app{padding:12px;}
      .top{align-items:flex-start;}
      h1{font-size:26px;}
      .logo{width:52px;height:52px;}
      .setup-grid{grid-template-columns:1fr 1fr;}
      .game-layout{grid-template-columns:1fr;}
      .players{grid-template-columns:repeat(2,1fr);}
      .big-number{font-size:44px;}
    }

    @media(max-width:560px){
      .setup-grid{grid-template-columns:1fr;}
      .panel{padding:14px;}
      .players{grid-template-columns:repeat(2,1fr);}
      .input-row{grid-template-columns:1.1fr .8fr .8fr;}
      .keys{grid-template-columns:repeat(4,1fr);}
      th,td{font-size:13px;padding:8px 6px;}
    }
  </style>
</head>

<body>
  <div class="toast" id="toast"></div>

  <div class="app">
    <div class="top">
      <div class="brand">
        <div class="logo">🃏</div>
        <div>
          <h1>JOKER</h1>
          <div class="sub">ანგარიშის დასათვლელი პლატფორმა</div>
        </div>
      </div>
      <button class="btn secondary" onclick="loadState()">განახლება</button>
    </div>

    <section id="setupScreen" class="glass panel">
      <h2>თამაშის პარამეტრები</h2>

      <div class="grid setup-grid">
        <div><label>მოთამაშე 1</label><input id="p1" value="მოთამაშე 1"></div>
        <div><label>მოთამაშე 2</label><input id="p2" value="მოთამაშე 2"></div>
        <div><label>მოთამაშე 3</label><input id="p3" value="მოთამაშე 3"></div>
        <div><label>მოთამაშე 4 / პირველი დამრიგებელი</label><input id="p4" value="მოთამაშე 4"></div>

        <div>
          <label>რეჟიმი</label>
          <select id="mode">
            <option>ინდივიდუალური</option>
            <option>პარა</option>
          </select>
        </div>

        <div>
          <label>ჩვეულებრივი ხიშტი</label>
          <input id="normalKhishti" type="number" value="200">
        </div>

        <div>
          <label>9-იანების ხიშტი</label>
          <input id="nineKhishti" type="number" value="500">
        </div>

        <div>
          <label>ხიშტის რეჟიმი</label>
          <select id="khishtiMode">
            <option value="fixed">ჩაწერილი თანხით</option>
            <option value="dynamic">X — კარტი × 100</option>
          </select>
        </div>
      </div>

      <div style="margin-top:18px;">
        <button class="btn" onclick="startGame()">დაიწყე თამაში</button>
      </div>
    </section>

    <section id="gameScreen" class="hidden">
      <div class="game-layout">

        <aside class="glass panel">
          <div class="stat-card">
            <div class="sub">მიმდინარე დარიგება</div>
            <div class="big-number" id="cardsNow">1</div>
            <div style="text-align:center;color:var(--muted)">კარტი</div>
          </div>

          <div class="stat-card">
            <div class="sub">შევსებამდე აკლია</div>
            <div class="big-number" id="fillNeed" style="color:var(--gold)">0</div>
          </div>

          <div class="stat-card">
            <div class="sub">სტატუსი</div>
            <div class="status-text" id="handStatus">---</div>
          </div>
        </aside>

        <main class="glass panel">
          <div class="players" id="scoreCards"></div>

          <div class="hand-form">
            <div class="input-row" style="color:var(--muted);font-weight:800;">
              <div>მოთამაშე</div>
              <div>თქვა</div>
              <div>აიღო</div>
            </div>
            <div id="handInputs"></div>

            <button class="btn" onclick="saveHand()">ხელის შენახვა</button>
            <button class="btn red" onclick="endGame()">თამაშის დასრულება / ახალი თამაში</button>
          </div>

          <div style="height:14px"></div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>პულკა</th>
                  <th>კარტი</th>
                  <th id="h1">P1</th>
                  <th id="h2">P2</th>
                  <th id="h3">P3</th>
                  <th id="h4">P4</th>
                  <th>შედეგი</th>
                </tr>
              </thead>
              <tbody id="history"></tbody>
            </table>
          </div>
        </main>

        <aside class="glass panel">
          <div class="stat-card">
            <div class="sub">ხელის ნომერი</div>
            <div class="big-number" id="handNo">1</div>
          </div>

          <div class="stat-card">
            <div class="sub">ვინც არიგებს</div>
            <div class="status-text" id="dealerName">---</div>
          </div>

          <div class="stat-card">
            <div class="sub">პირველი ამბობს</div>
            <div class="status-text" id="speakerName">---</div>
          </div>
        </aside>

      </div>
    </section>
  </div>

  <div class="keyboard" id="keyboard">
    <div class="keys" id="keys"></div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyjS0CJTjCMWlgBV4nb4ViR9WrMz1QmLLsNXoZNnD_dMvis5UPEi9zE4YJNR8B2Zn2q/exec";

const sequence = [1,2,3,4,5,6,7,8,9,9,9,9,8,7,6,5,4,3,2,1,9,9,9,9];

let state = null;
let players = [];
let totals = [0,0,0,0];
let currentHand = 1;
let activeBox = null;
let activeType = null;
let activeIndex = null;

document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("dblclick", e => e.preventDefault(), {passive:false});

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  clearTimeout(window.__toast);
  window.__toast=setTimeout(()=>t.style.display="none",2600);
}

async function apiPost(payload){
  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(payload)
  });
  return await res.json();
}

async function apiGet(){
  const res = await fetch(API_URL);
  return await res.json();
}

async function startGame(){
  const data = await apiPost({
    action:"startGame",
    p1:val("p1"),
    p2:val("p2"),
    p3:val("p3"),
    p4:val("p4"),
    mode:val("mode"),
    normalKhishti:val("normalKhishti"),
    nineKhishti:val("nineKhishti"),
    khishtiMode:val("khishtiMode")
  });

  if(data.status !== "success"){
    toast(data.error || data.message || "შეცდომა");
    return;
  }

  toast("თამაში დაიწყო ✅");
  await loadState();
}

async function loadState(){
  const data = await apiGet();

  if(data.status !== "success"){
    toast("მონაცემები ვერ ჩაიტვირთა");
    return;
  }

  state = data.state;

  if(!state.settings.gameId || state.settings.status !== "active"){
    document.getElementById("setupScreen").classList.remove("hidden");
    document.getElementById("gameScreen").classList.add("hidden");
    return;
  }

  document.getElementById("setupScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  players = state.players.map(r => r[1]);
  totals = state.players.map(r => Number(r[3] || 0));
  currentHand = state.hands.length + 1;

  if(currentHand > sequence.length){
    currentHand = sequence.length;
    toast("ყველა ხელი დასრულებულია");
  }

  renderAll();
}

function renderAll(){
  renderScoreCards();
  renderHandInputs();
  renderHistory();
  renderInfo();
}

function renderScoreCards(){
  const box=document.getElementById("scoreCards");
  box.innerHTML="";

  players.forEach((p,i)=>{
    const div=document.createElement("div");
    div.className="player-card";
    div.innerHTML=`
      <div class="player-name">${p}</div>
      <div class="score">${totals[i] || 0}</div>
    `;
    box.appendChild(div);

    document.getElementById("h"+(i+1)).innerText=p;
  });
}

function renderHandInputs(){
  const wrap=document.getElementById("handInputs");
  wrap.innerHTML="";

  players.forEach((p,i)=>{
    const row=document.createElement("div");
    row.className="input-row";
    row.innerHTML=`
      <div>${p}</div>
      <div class="box" id="said-${i}" onclick="openKeyboard('said',${i})"></div>
      <div class="box" id="took-${i}" onclick="openKeyboard('took',${i})"></div>
    `;
    wrap.appendChild(row);
  });
}

function renderInfo(){
  const cards = sequence[currentHand-1] || 1;

  const dealer = ((currentHand + 2) % 4);
  const speaker = (dealer + 1) % 4;

  document.getElementById("cardsNow").innerText = cards;
  document.getElementById("handNo").innerText = currentHand;
  document.getElementById("dealerName").innerText = players[dealer] || "---";
  document.getElementById("speakerName").innerText = players[speaker] || "---";

  updateSaidStatus();
}

function renderHistory(){
  const tbody=document.getElementById("history");
  tbody.innerHTML="";

  state.hands.slice().reverse().forEach(r=>{
    const tr=document.createElement("tr");

    const cells = [
      r[1],
      r[3],
      r[5],
      playerCell(r,0),
      playerCell(r,1),
      playerCell(r,2),
      playerCell(r,3),
      `${r[9]} ${r[10]}`
    ];

    tr.innerHTML = cells.map(c=>`<td>${c}</td>`).join("");
    tbody.appendChild(tr);
  });
}

function playerCell(r,i){
  const said = showPass(r[11 + i*5]);
  const took = showPass(r[12 + i*5]);
  const score = r[14 + i*5];
  const note = String(r[15 + i*5] || "");

  let cls = "";
  if(note.includes("ხიშტი")) cls="bed";
  if(note.includes("პრემია")) cls="premium";

  return `<span class="${cls}">${said}/${took} = ${score}<br><small>${note}</small></span>`;
}

function openKeyboard(type,index){
  activeType=type;
  activeIndex=index;
  activeBox=document.getElementById(`${type}-${index}`);

  document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
  activeBox.classList.add("active");

  renderKeyboard();
  document.getElementById("keyboard").classList.add("open");
}

function renderKeyboard(){
  const cards = sequence[currentHand-1];
  const keys=document.getElementById("keys");
  keys.innerHTML="";

  for(let n=0;n<=cards;n++){
    const btn=document.createElement("button");
    btn.className="key";
    btn.innerText = n === 0 ? "-" : n;

    if(activeType === "said" && isForbiddenSaid(n)){
      btn.classList.add("blocked");
    }else{
      btn.onclick=()=>pressKey(n);
    }

    keys.appendChild(btn);
  }

  const clear=document.createElement("button");
  clear.className="key";
  clear.innerText="C";
  clear.onclick=()=>pressKey("");
  keys.appendChild(clear);

  const ok=document.createElement("button");
  ok.className="key";
  ok.innerText="OK";
  ok.onclick=closeKeyboard;
  keys.appendChild(ok);
}

function isForbiddenSaid(n){
  const cards = sequence[currentHand-1];
  let sum = 0;
  let filled = 0;

  for(let i=0;i<4;i++){
    const el=document.getElementById(`said-${i}`);
    if(i === activeIndex) continue;
    if(el && el.dataset.value !== undefined && el.dataset.value !== ""){
      sum += Number(el.dataset.value);
      filled++;
    }
  }

  return filled === 3 && sum + Number(n) === cards;
}

function pressKey(n){
  if(n === ""){
    activeBox.innerText = "";
    activeBox.dataset.value = "";
  }else{
    activeBox.dataset.value = n;
    activeBox.innerText = n === 0 ? "-" : n;
  }

  activeBox.classList.remove("active");
  closeKeyboard();
  updateSaidStatus();
}

function closeKeyboard(){
  document.getElementById("keyboard").classList.remove("open");
}

function updateSaidStatus(){
  const cards = sequence[currentHand-1];
  let sum=0;
  let filled=0;

  for(let i=0;i<4;i++){
    const el=document.getElementById(`said-${i}`);
    if(el && el.dataset.value !== undefined && el.dataset.value !== ""){
      sum += Number(el.dataset.value);
      filled++;
    }
  }

  const need = cards - sum;
  document.getElementById("fillNeed").innerText = need > 0 ? need : 0;

  const status=document.getElementById("handStatus");

  if(filled < 4){
    status.innerText = need > 0 ? `აკლია ${need}` : `წაგლეჯვა ${Math.abs(need)}`;
  }else{
    if(sum > cards) status.innerText = `წაგლეჯვა ${sum-cards}`;
    else if(sum < cards) status.innerText = `შეტენვა ${cards-sum}`;
    else status.innerText = "აკრძალულია";
  }
}

async function saveHand(){
  const cards = sequence[currentHand-1];

  let payload = {
    action:"saveHand",
    handNumber:currentHand
  };

  let tookTotal=0;
  let saidTotal=0;

  for(let i=0;i<4;i++){
    const saidEl=document.getElementById(`said-${i}`);
    const tookEl=document.getElementById(`took-${i}`);

    const said=saidEl.dataset.value;
    const took=tookEl.dataset.value;

    if(said === undefined || said === "" || took === undefined || took === ""){
      toast("შეავსე ყველა მოთამაშის თქვა/აიღო");
      return;
    }

    saidTotal += Number(said);
    tookTotal += Number(took);

    payload[`player${i+1}`] = {
      said:Number(said),
      took:Number(took)
    };
  }

  if(saidTotal === cards){
    toast("ნათქვამების ჯამი დარიგებულს არ უნდა უდრიდეს");
    return;
  }

  if(tookTotal !== cards){
    toast(`აღებული ჯამში უნდა იყოს ${cards}`);
    return;
  }

  const data = await apiPost(payload);

  if(data.status !== "success"){
    toast(data.error || data.message || "შენახვის შეცდომა");
    return;
  }

  toast("ხელი შენახულია ✅");
  await loadState();
}

async function endGame(){
  if(!confirm("დავასრულოთ თამაში და დავიწყოთ ახალი?")) return;

  const data = await apiPost({action:"endGame"});

  if(data.status !== "success"){
    toast(data.error || data.message || "შეცდომა");
    return;
  }

  toast("თამაში დასრულდა და განულდა 🏆");
  await loadState();
}

function showPass(v){
  return Number(v) === 0 ? "-" : v;
}

function val(id){
  return document.getElementById(id).value.trim();
}

loadState();
</script>
